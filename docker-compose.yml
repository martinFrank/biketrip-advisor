services:
  backend:
    build: ./backend
    environment:
      - BIKETRIP_OLLAMA_BASE_URL=${BIKETRIP_OLLAMA_BASE_URL}
      - BIKETRIP_OLLAMA_CHAT_MODEL=${BIKETRIP_OLLAMA_CHAT_MODEL}
      - BIKETRIP_OLLAMA_REASONING_MODEL=${BIKETRIP_OLLAMA_REASONING_MODEL}
      - BIKETRIP_OLLAMA_PLANNING_MODEL=${BIKETRIP_OLLAMA_PLANNING_MODEL}
      - BIKETRIP_OLLAMA_LANGUAGE_MODEL=${BIKETRIP_OLLAMA_LANGUAGE_MODEL}
    ports:
      - "8080:8080"

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
